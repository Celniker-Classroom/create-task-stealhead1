<!-- The h1 element acts as a tittle, the container element is made
 to organize everything, so is the controls element. The field element
 will have cells created by javascript code using createElement and 
 appendChild. The play button starts the game, and score and high
 score update as the game is played -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Snake</h1>
    <div id="container">
        <div id="field"></div>
        <div id="controls">
            <button type="button" id="start">Play</button>
            <p id="score">Score: </p>
            <p id="highScore">High Score: 0</p>
            <label for="appleSelector">Number of Apples:</label>
            <input id="appleSelector" type="number" min="1" max="10" value="1"></input>
            <div id="difficulties">
                <p>Difficulty:</p>
                <input type="radio" xLength="8" yLength='8' name="difficulty" id="easy">Easy</input>
                <input type="radio" xLength="13" yLength='13' name="difficulty" id="medium" checked>Medium</input>
                <input type="radio" xLength="20" yLength='20' name="difficulty" id="hard" >Hard</input>
            </div>
            <p id="timer">Time: </p>
            <p id="directions">Use the arrow keys or WASD to control the snake</p>
        </div>
    </div>
</body>
</html>
